services:
  - type: web
    name: mnemine-app
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && cd server && npx prisma generate && tsc && pnpm run postbuild
    startCommand: cd server && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
    autoDeploy: true
    branch: main

  - type: pserv
    name: mnemine-db
    plan: starter
    databaseName: mnemine
    user: mnemine_user
