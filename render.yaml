services:
  - type: web
    name: mnemine-backend
    env: node
    plan: free
    buildCommand: |
      echo "Clearing pnpm cache..." && 
      pnpm store prune && 
      echo "Installing dependencies..." && 
      pnpm install && 
      echo "Building application..." && 
      pnpm run build:prod && 
      echo "Copying frontend files..." && 
      pnpm run copy:frontend && 
      echo "Setting up PostgreSQL database..." && 
      cd server && 
      echo "Generating Prisma client for PostgreSQL..." && 
      npx prisma generate --schema=./prisma/schema.prisma && 
      echo "Pushing database schema to PostgreSQL..." && 
      npx prisma db push --accept-data-loss --schema=./prisma/schema.prisma && 
      echo "Build completed successfully!"
    startCommand: |
      echo "Starting production server..." && 
      cd server && 
      echo "Ensuring PostgreSQL database is ready..." && 
      npx prisma db push --accept-data-loss --schema=./prisma/schema.prisma || echo "Database push failed, continuing..." && 
      echo "Starting Node.js server..." && 
      node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
