services:
  - type: web
    name: mnemine-app
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm run build && pnpm run copy:frontend
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mnemine-app.onrender.com
      - key: FRONTEND_URL
        value: https://mnemine-app.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://mnemine-app.onrender.com
      - key: VITE_BACKEND_URL
        value: https://mnemine-app.onrender.com
      - key: VITE_WS_URL
        value: wss://mnemine-app.onrender.com/ws
      - key: VITE_APP_NAME
        value: Mnemine
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: LOG_LEVEL
        value: info
    autoDeploy: true
    branch: main

  - type: pserv
    name: mnemine-db
    plan: starter
    runtime: postgresql