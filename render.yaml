services:
  - type: web
    name: mnemine-backend
    env: node
    plan: free
    buildCommand: |
      pnpm install --frozen-lockfile
      pnpm run build:prod
      pnpm run copy:frontend
      echo "Setting up database..."
      cd server && npx prisma db push
      cd ..
    startCommand: pnpm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_TELEGRAM_ID
        value: "6760298907"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "50"
      - key: LOG_LEVEL
        value: warn

databases:
  - name: mnemine-db
    plan: free
    databaseName: mnemine
    user: mnemine_user