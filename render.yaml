services:
  # Backend Service
  - type: web
    name: mnemine-backend
    env: node
    plan: starter
    rootDirectory: server
    buildCommand: pnpm install --frozen-lockfile && npx prisma generate && tsc && pnpm run postbuild
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: PORT
        value: 10000 # Render will inject its own PORT, but good to have a default
      - key: JWT_SECRET
        generateValue: true # Render will generate a secure value
      - key: TELEGRAM_BOT_TOKEN
        sync: false # User must provide this in Render dashboard
      - key: ADMIN_TELEGRAM_ID
        sync: false # User must provide this in Render dashboard
      - key: BACKEND_URL
        value: https://mnemine-backend.onrender.com # Render will set this to the service URL
      - key: FRONTEND_URL
        value: https://mnemine-frontend.onrender.com # Render will set this to the frontend service URL
      - key: ALLOWED_ORIGINS
        value: https://mnemine-frontend.onrender.com # Allow frontend to access backend
      - key: VITE_BACKEND_URL # For client-side API calls
        value: https://mnemine-backend.onrender.com
      - key: VITE_WS_URL # For client-side WebSocket connections
        value: wss://mnemine-backend.onrender.com/ws
    autoDeploy: true
    branch: main

  # Frontend Service
  - type: web
    name: mnemine-frontend
    env: static
    rootDirectory: client
    buildCommand: pnpm install --frozen-lockfile && vite build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL # Frontend needs to know backend URL
        value: https://mnemine-backend.onrender.com
      - key: VITE_WS_URL # Frontend needs to know WebSocket URL
        value: wss://mnemine-backend.onrender.com/ws
      - key: VITE_APP_NAME
        value: Mnemine
    autoDeploy: true
    branch: main

  # PostgreSQL Database
  - type: pserv
    name: mnemine-db
    plan: starter
    databaseName: mnemine
    user: mnemine_user