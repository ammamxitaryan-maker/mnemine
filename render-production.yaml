services:
  - type: web
    name: mnemine-production
    env: production
    plan: starter
    buildCommand: |
      echo "Starting production build..."
      npm install -g pnpm@latest
      pnpm install --frozen-lockfile
      echo "Building shared components..."
      pnpm run build:shared
      echo "Building client..."
      pnpm run build:client
      echo "Building server..."
      pnpm run build:server
      echo "Copying frontend..."
      pnpm run copy:frontend
      echo "Setting up database..."
      cd server
      echo "Generating Prisma client..."
      npx prisma generate
      echo "Pushing database schema..."
      npx prisma db push --force-reset --accept-data-loss
      echo "Database setup completed"
      cd ..
      echo "Verifying deployment..."
      pnpm run verify:deployment
      echo "Build completed successfully!"
    startCommand: |
      echo "Starting production server..."
      cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10112
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: VITE_BACKEND_URL
        value: https://mnemine-production.onrender.com
      - key: VITE_WS_URL
        value: wss://mnemine-production.onrender.com/ws
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_BUILD_TIME
        value: 2024-01-01T00:00:00Z

databases:
  - name: mnemine-db
    plan: starter
    databaseName: mnemine_production
    user: mnemine_user
