services:
  - type: web
    name: mnemine-app
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm run build && pnpm run copy:frontend
    startCommand: node server/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
    autoDeploy: true
    branch: main

  - type: pserv
    name: mnemine-db
    plan: starter
