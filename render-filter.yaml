services:
  # Backend Service
  - type: web
    name: mnemine-backend
    env: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter server run build
    startCommand: cd server && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://mnemine-frontend.onrender.com
    autoDeploy: true
    branch: main

  # Frontend Service
  - type: web
    name: mnemine-frontend
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter client run build
    staticPublishPath: ./client/dist
    envVars:
      - key: VITE_API_URL
        value: https://mnemine-backend.onrender.com
      - key: VITE_APP_NAME
        value: Mnemine
    autoDeploy: true
    branch: main

  # PostgreSQL Database
  - type: pserv
    name: mnemine-db
    plan: starter
    databaseName: mnemine
    user: mnemine_user