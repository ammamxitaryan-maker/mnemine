services:
  - type: web
    name: mnemine-backend
    env: node
    plan: starter
    rootDirectory: server
    buildCommand: pnpm run build
    startCommand: pnpm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
    autoDeploy: true
    branch: main

  - type: web
    name: mnemine-frontend
    env: static
    rootDirectory: server
    buildCommand: echo "Using existing public files"
    staticPublishPath: ./public
    envVars:
      - key: VITE_BACKEND_URL
        value: https://mnemine-backend.onrender.com
      - key: VITE_WS_URL
        value: wss://mnemine-backend.onrender.com/ws
      - key: VITE_APP_NAME
        value: Mnemine
    autoDeploy: true
    branch: main

  - type: pserv
    name: mnemine-db
    plan: starter
    databaseName: mnemine
    user: mnemine_user
