services:
  - type: web
    name: mnemine-production-fixed
    env: production
    plan: starter
    buildCommand: |
      echo "🚀 Starting production build..."
      npm install -g pnpm@latest
      echo "📦 Installing dependencies..."
      pnpm install --frozen-lockfile
      echo "🔨 Building shared components..."
      pnpm run build:shared
      echo "🎨 Building client..."
      pnpm run build:client
      echo "⚙️ Building server..."
      pnpm run build:server
      echo "📁 Copying frontend..."
      pnpm run copy:frontend
      echo "🗄️ Setting up database..."
      cd server
      echo "Generating Prisma client..."
      npx prisma generate
      echo "Pushing database schema..."
      npx prisma db push --force-reset
      echo "Verifying database setup..."
      npx prisma db seed || echo "No seed script found, continuing..."
      cd ..
      echo "✅ Build completed successfully!"
    startCommand: |
      echo "🚀 Starting production server..."
      cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10112
      - key: DATABASE_URL
        fromDatabase:
          name: mnemine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        value: "8422118658:AAHQHHJbO8CszCJRY8J0Rk8AQKVmqFp6HbE"
      - key: ADMIN_TELEGRAM_ID
        value: "6760298907"
      - key: VITE_BACKEND_URL
        value: https://mnemine-production-fixed.onrender.com
      - key: VITE_WS_URL
        value: wss://mnemine-production-fixed.onrender.com/ws
      - key: VITE_APP_VERSION
        value: 1.0.0
      - key: VITE_BUILD_TIME
        value: 2024-01-01T00:00:00Z
      - key: TELEGRAM_WEBHOOK_URL
        value: https://mnemine-production-fixed.onrender.com/api/webhook/8422118658:AAHQHHJbO8CszCJRY8J0Rk8AQKVmqFp6HbE

databases:
  - name: mnemine-db
    plan: starter
    databaseName: mnemine_production
    user: mnemine_user
